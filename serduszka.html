<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f393c3; 
            cursor: pointer; 
        }

        .heart {
            position: absolute;
            bottom: -100px; 
            background-image: url('serce-2.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.8;
            pointer-events: none;
            z-index: 999;
            animation: fly linear forwards;
        }

        .heart-burst {
            position: absolute;
            background-image: url('serce-2.png');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes fly {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(20deg); 
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + "vw";
            const duration = Math.random() * 4 + 3;
            heart.style.animationDuration = duration + "s";
            const size = Math.random() * 40 + 20;
            heart.style.width = size + "px";
            heart.style.height = size + "px";
            heart.style.animationDelay = Math.random() * 2 + "s";

            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, (duration + 2) * 1000);
        }

        setInterval(createHeart, 200);

        window.addEventListener('click', (e) => {
            const amount = 10; 

            for (let i = 0; i < amount; i++) {
                const burstHeart = document.createElement('div');
                burstHeart.classList.add('heart-burst');
 
                const size = Math.random() * 25 + 15;
                burstHeart.style.width = size + "px";
                burstHeart.style.height = size + "px";

                burstHeart.style.left = e.clientX - (size / 2) + "px";
                burstHeart.style.top = e.clientY - (size / 2) + "px";

                document.body.appendChild(burstHeart);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 200 + 100;
                const x = Math.cos(angle) * velocity;
                const y = Math.sin(angle) * velocity;

                burstHeart.animate([
                    { transform: 'translate(0, 0) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${x}px, ${y}px) scale(0) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'ease-out'
                }).onfinish = () => burstHeart.remove();
            }
        });
    </script>
</body>
</html>
