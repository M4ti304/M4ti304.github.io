<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🩷</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f49dff; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif;
        }

        .heart-container {
            position: relative;
            z-index: 999; 
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Synchronizacja pulsu dla całego kontenera (serce + tekst) */
            animation: pulse 2s infinite ease-in-out;
        }

        .heart {
            width: 300px;
            height: auto; 
            cursor: pointer;
            display: block;
        }

        .heart-text {
            font-family: 'Pacifico', cursive;
            position: absolute;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            opacity: 0; /* Początkowo niewidoczny */
            animation: fadeIn 1s forwards;
            animation-delay: 3s; /* Pojawia się po 3 sekundach */
        }

        .small-heart {
            position: absolute;
            bottom: -50px; 
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: floatUp var(--duration) linear forwards;
        }

        .small-heart img {
            width: 100%;
            height: auto;
        }

   
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="heart-container">

        <img src="serce-3.png" id="serce" alt="serce" class="heart">

        <div class="heart-text">Kocham Cię!💖</div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'small-heart';

            heart.innerHTML = `<img src="serce-3.png">`;

            const startPos = Math.random() * 100;
            heart.style.left = startPos + 'vw';

            const size = Math.random() * 30 + 20; 
            heart.style.width = size + 'px';

            const duration = Math.random() * 3 + 4;
            heart.style.setProperty('--duration', duration + 's');

            heart.style.animationDelay = Math.random() * 5 + 's';

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        for (let i = 0; i < 30; i++) {
            createHeart();
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
