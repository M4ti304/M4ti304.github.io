<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🩷🩷</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url(tło.jpg);
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            font-family: sans-serif;
        }

        .heart-container {
            position: relative; 
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .heart {
            width: 100%;
            height: 100%;
            animation: pulse 2s infinite ease-in-out;
        }

        #napis-kliknij {
            position: absolute;
            z-index: 2; 
            color: white;
            font-size: 25px;
            font-weight: bold;
            text-transform: uppercase;
            pointer-events: none; 
            animation: pulse 2s infinite ease-in-out;
        }

        #tekst-wynikowy {
            display: none; 
            position: absolute;
            z-index: 3;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            font-size: 24px;
            color: black;
            text-align: center;
            min-width: 200px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="heart-container" onclick="wyswietl()">
        <div id="napis-kliknij">Klik&#128070</div>

        <div id="tekst-wynikowy">Wszystkiego co najlepsze z okazji dnia kobiet dla mojej <b>ulubionej analitycznki</b>💖<p></p>Jesteś dla mnie najważniejszą osobą na tym świecie, nie ma takiej drugiej jak ty❤️</div>

        <img src="serce.png" alt="Serce" id="serce" class="heart">
    </div>

<script>
function wyswietl() {
   
    const wynik = document.getElementById("tekst-wynikowy");
    const kliknij = document.getElementById("napis-kliknij");
    const serce = document.getElementById("serce");

    wynik.style.display = "block"; 
    kliknij.style.display = "none"; 

    serce.style.animation = "none";
}
</script>

</body>
</html>
